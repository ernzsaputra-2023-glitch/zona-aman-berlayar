<!-- templates/home.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Zona Aman Berlayar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root{
      --brand:#1e88e5;
      --brand2:#1565c0;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        linear-gradient(rgba(2, 10, 25, .55), rgba(2, 10, 25, .55)),
        url("{{ url_for('static', filename='img/home-bg.jpg') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      position: relative;
      color:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .logos{
      position: absolute;
      top: 18px;
      right: 22px;
      display:flex;
      gap: 12px;
    }
    .logos img{
      height: 54px;
      background: rgba(255,255,255,.9);
      padding: 6px 10px;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
    }

    .welcome-card{
      width: min(920px, 96vw);
      border-radius: 18px;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 16px 44px rgba(0,0,0,.28);
      padding: 32px;
    }

    .welcome-title{
      font-weight: 900;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .welcome-sub{
      font-size: 1.05rem;
      opacity: .9;
      max-width: 60ch;
    }

    .chip-row{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    .chip{
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: .9rem;
    }

    .btn-bmkg{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.15);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      transition:.2s;
    }
    .btn-bmkg:hover{
      background: rgba(255,255,255,.25);
      transform: translateY(-1px);
      color:#fff;
    }

    .btn-next{
      margin-top: 20px;
      display:inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      font-weight:900;
      text-decoration:none;
      box-shadow: 0 12px 26px rgba(30,136,229,.28);
    }
    .btn-next:hover{ color:#fff; }
  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="logos">
    <img src="{{ url_for('static', filename='img/logo-bmkg.jpg') }}" alt="BMKG">
    <img src="{{ url_for('static', filename='img/logo-unair.jpg') }}" alt="UNAIR">
  </div>

  <div class="welcome-card">
    <h1 class="welcome-title">Selamat Datang 👋</h1>
    <p class="welcome-sub">
      Sistem ini dapat membantu memprediksi tingkat keamanan berlayar, pastikan Anda sudah memiliki informasi terkait hal di bawah ini:
    </p>

    <div class="chip-row">
      <div class="chip">Tinggi Gelombang</div>
      <div class="chip">Kecepatan Arus</div> 
      <div class="chip">Kecepatan Angin</div> 
    </div>


    <!-- 🔗 LINK RESMI BMKG -->
     <div>
        <a href="https://www.bmkg.go.id/cuaca/maritim"
       target="_blank"
       class="btn-bmkg mb-3">
      🌐 Klik Untuk Membuka Laman BMKG Maritim
    </a>

    <br>
     </div>

    <!-- NEXT -->
    <a href="/dashboard" class="btn-next">Next → </a>
  </div>

</body>
</html>
